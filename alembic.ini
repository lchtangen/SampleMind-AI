# alembic.ini — Alembic migration configuration for SampleMind AI
# Run migrations with: uv run alembic upgrade head

[alembic]
# Path to the migrations directory (relative to the location of this file)
script_location = migrations

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Truncate long slugs in migration filenames
truncate_slug_length = 40

# Set to "true" to run the environment during tests (prevents accidental
# upgrades to the production DB when running the test suite)
prepend_sys_path = .

# Output encoding for .py migration scripts
output_encoding = utf-8

# ── Database URL ──────────────────────────────────────────────────────────────
# The actual URL is resolved dynamically from Settings in env.py.
# This entry is kept as a fallback / documentation only.
sqlalchemy.url = sqlite:///%(here)s/.samplemind_dev.db


[post_write_hooks]
# Run ruff format + check on newly generated migration files
hooks = ruff_format,ruff_check
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

ruff_check.type = console_scripts
ruff_check.entrypoint = ruff
ruff_check.options = check --fix REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

