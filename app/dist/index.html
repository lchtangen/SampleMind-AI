<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SampleMind AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e8eaf0;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
      user-select: none;
    }

    .logo { font-size: 56px; line-height: 1; }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #e8eaf0;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2d3a;
      border-top-color: #7c6ff7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #status {
      color: #6b7280;
      font-size: 14px;
      min-height: 20px;
      text-align: center;
      max-width: 320px;
    }

    .version {
      position: fixed;
      bottom: 20px;
      color: #3a3d4a;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="logo">🎧</div>
  <h1>SampleMind AI</h1>
  <div class="spinner"></div>
  <span id="status">Initializing…</span>
  <span class="version">v0.1.0</span>
</body>
</html>
