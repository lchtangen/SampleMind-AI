# ══════════════════════════════════════════════════════════════════════════════
# Workflow: release
# Purpose: macOS production release — Universal Binary build, signing,
#          notarization, sidecar bundling, GitHub release.
# Environment: prod (requires actual macOS)
# ══════════════════════════════════════════════════════════════════════════════

name: release
description: >
  Full macOS production release: CI check, sidecar build, Universal Binary,
  signing, notarization, auval validation, GitHub release.
agent: phase-10-production
environment: prod    # must be macOS — WSL2 cannot build Universal Binary
trigger: manual      # auggie workflow release

requires_confirmation: true

pre_flight_checks:
  - "uname -s | grep Darwin"        # must be macOS
  - "xcode-select -p"               # Xcode CLI tools installed
  - "rustup target list --installed | grep aarch64-apple-darwin"
  - "rustup target list --installed | grep x86_64-apple-darwin"

steps:
  - id: ci_check
    name: "Full CI check"
    workflow: ci-check    # runs entire ci-check workflow first
    must_pass: true

  - id: build_sidecar
    name: "Build PyInstaller sidecar (both architectures)"
    commands:
      - "uv run pyinstaller samplemind-server.spec --noconfirm"
      - "sha256sum dist/samplemind-server > app/src-tauri/resources/samplemind-server.sha256"
      - "cp dist/samplemind-server app/src-tauri/binaries/samplemind-server-aarch64-apple-darwin"
      - "cp dist/samplemind-server app/src-tauri/binaries/samplemind-server-x86_64-apple-darwin"

  - id: build_universal
    name: "Build Tauri Universal Binary"
    command: "cd app && pnpm tauri build --target universal-apple-darwin"

  - id: verify_universal
    name: "Verify Universal Binary architecture"
    command: >
      lipo -info app/src-tauri/target/universal-apple-darwin/release/bundle/macos/SampleMind.app/Contents/MacOS/SampleMind
    expected_output: "Architectures in the fat file: x86_64 arm64"

  - id: sign
    name: "Sign the app bundle"
    requires_env: [APPLE_SIGNING_IDENTITY]
    command: >
      codesign --deep --force --verify --verbose
      --sign "$APPLE_SIGNING_IDENTITY"
      --entitlements app/src-tauri/entitlements.plist
      app/src-tauri/target/universal-apple-darwin/release/bundle/macos/SampleMind.app

  - id: notarize
    name: "Submit for notarization"
    requires_env: [APPLE_TEAM_ID, APPLE_ID, APPLE_PASSWORD]
    command: >
      xcrun notarytool submit
      app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
      --keychain-profile SampleMind-Notarize --wait

  - id: staple
    name: "Staple notarization ticket"
    command: >
      xcrun stapler staple
      app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  - id: auval
    name: "AU plugin validation (if plugin rebuilt)"
    command: "auval -v aufx SmPl SmAI"
    skip_if: plugin_unchanged

  - id: github_release
    name: "Create GitHub release"
    action: >
      Tag the commit (vX.Y.Z), create GitHub release, upload:
      - .dmg (macOS Universal Binary)
      - .msi / NSIS installer (Windows, if cross-compiled)
      Requires confirmation before tagging.
    requires_confirmation: true

reporting:
  on_pass: "✅ Release complete — artifact at app/src-tauri/target/universal-apple-darwin/release/bundle/dmg/"
  on_fail: "❌ Release failed at step above — fix and re-run"

