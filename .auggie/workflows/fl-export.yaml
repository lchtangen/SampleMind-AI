# ══════════════════════════════════════════════════════════════════════════════
# Workflow: fl-export
# Export selected samples to the FL Studio Samples folder.
# Agents: phase-07-fl-studio, fl-studio-agent
# ══════════════════════════════════════════════════════════════════════════════

name: fl-export
description: >
  Export selected samples to the FL Studio Samples/SampleMind/ directory,
  optionally copy the path to the clipboard, and optionally focus FL Studio's
  sample browser via AppleScript (macOS only).
agents: [phase-07-fl-studio, fl-studio-agent]
trigger_keywords: [FL Studio, export, send to FL Studio, clipboard, AppleScript]

platforms:
  primary: macOS 12+
  secondary: Windows 10/11

steps:
  1_locate_fl_path:
    name: "Find FL Studio Samples directory"
    code: |
      import platform
      from pathlib import Path

      FL_MACOS = [
          Path.home() / "Documents/Image-Line/FL Studio/Data/Patches/Samples/SampleMind",
          Path.home() / "Documents/Image-Line/FL Studio 21/Data/Patches/Samples/SampleMind",
      ]
      FL_WIN = [
          Path.home() / "Documents/Image-Line/FL Studio/Data/Patches/Samples/SampleMind",
          Path.home() / "Documents/Image-Line/FL Studio 21/Data/Patches/Samples/SampleMind",
      ]

      def get_fl_path() -> Path:
          paths = FL_MACOS if platform.system() == "Darwin" else FL_WIN
          for p in paths:
              if p.parent.exists():
                  p.mkdir(parents=True, exist_ok=True)
                  return p
          raise RuntimeError("FL Studio not found — is it installed?")
    stop_if: "RuntimeError raised — FL Studio not installed at expected path"

  2_export_files:
    name: "Copy WAV files to FL Studio Samples/SampleMind/"
    command: "uv run samplemind export --ids {ids} --dest fl-studio --json"
    code: |
      import shutil
      from pathlib import Path

      def export_to_fl(sample_paths: list[Path], fl_path: Path) -> list[Path]:
          exported = []
          for src in sample_paths:
              dest = fl_path / src.name
              if not dest.exists():          # never overwrite existing
                  shutil.copy2(str(src), str(dest))
              exported.append(dest)
          return exported
    rules:
      - "Copy only — never move (preserve source library)"
      - "Never overwrite existing files in FL Studio folder"
      - "Preserve original filename"

  3_clipboard:
    name: "Copy path to clipboard (macOS / Windows)"
    code: |
      import subprocess, platform
      from pathlib import Path

      def copy_to_clipboard(path: Path) -> None:
          if platform.system() == "Darwin":
              subprocess.run(["pbcopy"], input=str(path).encode(), check=True)
          elif platform.system() == "Windows":
              subprocess.run(["clip"], input=str(path).encode(), check=True)
          else:  # Linux (WSL2 dev)
              subprocess.run(["xclip", "-selection", "clipboard"],
                             input=str(path).encode(), check=True)
    note: "Clipboard = plain text path only — no extra formatting"

  4_focus_fl_studio:
    name: "Focus FL Studio browser via AppleScript (macOS only)"
    platform: macOS only
    command: |
      osascript -e 'tell application "FL Studio" to activate'
      osascript -e 'tell application "System Events" to keystroke "b" using {command down}'
    code: |
      import subprocess, platform

      SCRIPT = '''
      tell application "FL Studio" to activate
      tell application "System Events"
          keystroke "b" using {command down}
      end tell
      '''

      def focus_fl_browser() -> None:
          if platform.system() != "Darwin":
              return  # silently skip on non-macOS
          subprocess.run(["osascript", "-e", SCRIPT], check=True)
    entitlement_required: "com.apple.security.automation.apple-events"

  5_verify:
    name: "Verify export succeeded"
    commands:
      - "ls -la {fl_path}/*.wav"
      - "uv run samplemind list --json | grep '{filename}'"
    expected: "Files present in FL Studio folder AND in SampleMind library"

platform_guards:
  applescript: "if platform.system() == 'Darwin'"
  clipboard_macos: "subprocess.run(['pbcopy'], ...)"
  clipboard_windows: "subprocess.run(['clip'], ...)"

required_entitlements_macos:
  - "com.apple.security.automation.apple-events  ← for osascript"
  - "com.apple.security.assets.music.read-write  ← for FL Studio folder"
  - "com.apple.security.files.user-selected.read-write  ← file picker"

testing:
  - "@pytest.mark.macos for AppleScript tests"
  - "Mock subprocess.run(['osascript']) for unit tests"
  - "Use tmp_path for FL Studio path in tests (not real FL Studio path)"

