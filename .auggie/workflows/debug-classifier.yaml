# ══════════════════════════════════════════════════════════════════════════════
# Workflow: debug-classifier
# Purpose: Debug why a sample was classified as X instead of Y.
#          Walks through every feature value and classifier decision tree.
# ══════════════════════════════════════════════════════════════════════════════

name: debug-classifier
description: >
  Step-by-step debugging of audio classification. Shows raw feature values,
  which classifier rules fired, and which thresholds were close to tipping.
agent: audio-analyzer
trigger: manual    # auggie workflow debug-classifier path=<file.wav>

steps:
  - id: extract_features
    name: "Extract raw feature values"
    command: "uv run samplemind analyze {path} --json"
    output_fields:
      - rms: "Amplitude → energy classifier"
      - centroid_norm: "Spectral brightness (0–1) → mood, instrument"
      - zcr: "Zero crossing rate → hihat (>0.1), kick (<0.08)"
      - flatness: "Spectral flatness → hihat (>0.2), sfx (>0.1)"
      - rolloff_norm: "85% energy frequency → hihat (>0.3)"
      - onset_mean: "Avg rhythmic attack → loop (>0.8), aggressive mood (>3.0)"
      - onset_max: "Peak rhythmic attack → kick (>4.0), snare (>3.0)"
      - low_freq_ratio: "Bass energy below 300 Hz → kick (>0.35), bass (>0.3)"
      - duration: "Length in seconds → loop (>2.0), kick/snare/hihat (<0.8–1.0)"

  - id: trace_energy
    name: "Trace energy classification"
    logic: |
      rms < 0.015  → "low"   (quiet — atmospheric, pads)
      rms < 0.060  → "mid"   (normal — melodic, snares)
      rms >= 0.060 → "high"  (loud — drums, bass hits)
    show: "Which branch fired and how far rms was from adjacent thresholds"

  - id: trace_instrument
    name: "Trace instrument classification (priority-ordered)"
    logic: |
      1. dur>2.0 AND onset_mean>0.8               → "loop"
      2. flat>0.2 AND zcr>0.1 AND rolloff>0.3 AND dur<1.0  → "hihat"
      3. lfr>0.35 AND onset_max>4.0 AND dur<0.8 AND zcr<0.08 → "kick"
      4. onset_max>3.0 AND flat>0.05 AND dur<0.8 AND lfr<0.35 → "snare"
      5. lfr>0.3 AND flat<0.05 AND dur>0.3         → "bass"
      6. dur>1.5 AND onset_mean<1.5 AND centroid>0.08 → "pad"
      7. centroid>0.15 AND flat<0.1 AND dur<3.0    → "lead"
      8. flat>0.1                                   → "sfx"
      9. (none matched)                             → "unknown"
    show: "Which rule matched first, which rules failed and why"

  - id: trace_mood
    name: "Trace mood classification"
    logic: |
      zcr>0.08 AND onset_mean>3.0 AND centroid>0.15  → "aggressive"
      centroid<0.12 AND minor_key                    → "dark"
      minor_key AND rms<0.03 AND onset_mean<1.5      → "melancholic"
      centroid<0.15 AND rms<0.05 AND onset_mean<2.0  → "chill"
      major_key AND centroid>0.12 AND rms>0.02       → "euphoric"
      (none)                                         → "neutral"

  - id: suggest_fix
    name: "Suggest calibration or fixture fix"
    action: |
      If classification seems wrong:
      1. Show which feature value is closest to a threshold boundary
      2. Suggest: "Adjust threshold in classifier.py line XX from Y to Z"
      3. If this is a test fixture: show the synthetic WAV parameters to change
      4. Reference: src/samplemind/analyzer/classifier.py

reporting:
  format: >
    Decision table showing each feature value, threshold, pass/fail,
    and the final classification with confidence expressed as threshold delta.

