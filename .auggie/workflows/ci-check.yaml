# ══════════════════════════════════════════════════════════════════════════════
# Workflow: ci-check
# Purpose: Full local CI check — mirrors what GitHub Actions ci.yml runs.
#          Run before every commit and PR.
# ══════════════════════════════════════════════════════════════════════════════

name: ci-check
description: >
  Full CI suite: ruff lint + format, pytest with coverage, cargo clippy.
  Equivalent to GitHub Actions pipeline. Run before every commit.
agent: test-runner
trigger: manual    # auggie workflow ci-check

steps:
  - id: ruff_lint
    name: "Python lint (ruff)"
    command: "uv run ruff check src/ tests/"
    on_failure: suggest "uv run ruff check --fix src/ tests/"

  - id: ruff_format
    name: "Python format (ruff)"
    command: "uv run ruff format --check src/ tests/"
    on_failure: suggest "uv run ruff format src/ tests/"

  - id: pytest
    name: "Python tests"
    command: "uv run pytest tests/ -v --tb=short -n auto"
    fallback: "uv run pytest tests/ -v --tb=short"
    on_failure: show_full_traceback=true

  - id: coverage
    name: "Coverage check (≥60%)"
    command: "uv run pytest tests/ --cov=samplemind --cov-report=term-missing --cov-fail-under=60 -q"
    on_failure: >
      Identify uncovered modules. Suggest adding tests for classifier
      threshold boundaries and edge cases.

  - id: clippy
    name: "Rust lint (clippy)"
    command: "cargo clippy --manifest-path app/src-tauri/Cargo.toml -- -D warnings"
    skip_if: no_rust_changes
    on_failure: fix warnings before proceeding

reporting:
  format: table      # ✓/✗ table per step
  on_pass: "✅ CI PASS — safe to commit"
  on_fail: "❌ CI FAIL — fix issues above before committing"

shortcuts:
  fast: "skip clippy step — use when Rust code unchanged"
  fix:  "auto-fix ruff issues then re-run"

