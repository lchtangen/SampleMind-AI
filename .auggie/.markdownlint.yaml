# Relaxed markdownlint config for Auggie CLI docs
MD001: false   # Allow multiple top-level headings
MD002: false   # Allow first heading to be any level
MD003: false   # Allow heading style variations
MD004: false   # Allow unordered list style variations
MD005: false   # Allow inconsistent indentation for list items
MD006: false   # Allow indented list items
MD007: false   # Allow unordered list indentation
MD009: false   # Allow trailing spaces
MD010: false   # Allow hard tabs
MD011: false   # Allow reversed link syntax
MD012: false   # Allow multiple consecutive blank lines
MD013: false   # Ignore line length
MD014: false   # Allow dollar signs before commands
MD018: false   # Allow no space after hash on atx style heading
MD019: false   # Allow multiple spaces after hash on atx style heading
MD020: false   # Allow no space inside hashes on closed atx style heading
MD021: false   # Allow space inside hashes on closed atx style heading
MD022: false   # Allow headers to be preceded by multiple blank lines
MD023: false   # Allow headers to be followed by multiple blank lines
MD024: false   # Allow multiple headers with the same content
MD025: false   # Allow multiple top-level headings
MD026: false   # Allow trailing punctuation in headings
MD027: false   # Allow multiple spaces after blockquote symbol
MD028: false   # Allow blank line inside blockquote
MD029: false   # Allow ordered list item prefix variations
MD030: false   # Allow spaces after list markers
MD031: false   # Allow fenced code blocks without language
MD032: false   # Allow lists to start without a blank line
MD033: false   # Allow inline HTML
MD034: false   # Allow bare URL
MD035: false   # Allow horizontal rule style variations
MD036: false   # Allow emphasis used instead of a heading
MD037: false   # Allow spaces inside emphasis markers
MD038: false   # Allow spaces inside code span elements
MD039: false   # Allow spaces inside link text
MD040: false   # Allow fenced code blocks to be indented
MD041: false   # No top-level heading required
MD042: false   # Allow file name to not match first heading
MD043: false   # Allow required headings to be missing
MD045: false   # Allow images without alt text
MD046: false   # Allow code block style variations
MD047: false   # Allow files to end without a blank line
MD048: false   # Allow code fence style variations
MD049: false   # Allow indented code blocks
MD050: false   # Allow multiple spaces between words
