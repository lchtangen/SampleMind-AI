# ══════════════════════════════════════════════════════════════════════════════
# Skill: semantic_search
# Find samples by text description or audio reference using CLAP embeddings.
# Owner: phase-11-semantic-search
# ══════════════════════════════════════════════════════════════════════════════

name: semantic_search
description: >
  Find samples by natural language description or audio reference.
  Uses CLAP (Contrastive Language-Audio Pretraining) to embed both
  text and audio into the same 512-dimensional space, then searches
  the FAISS vector index for nearest neighbors by cosine similarity.
agent: phase-11-semantic-search
feature_flag: semantic_search

commands:
  text_search:
    cli: "uv run samplemind semantic '{query}' --top {k} --json"
    api: "GET /api/v1/search/semantic?q={query}&top={k}&min_score={threshold}"
    tauri: "invoke('semantic_search', { query, topK })"
  audio_search:
    cli: "uv run samplemind semantic --audio {reference_wav} --top {k}"
    api: "POST /api/v1/search/semantic/audio (multipart: audio file)"
  rebuild_index:
    cli: "uv run samplemind index rebuild"
    api: "POST /api/v1/index/rebuild (admin only)"
    tauri: "invoke('rebuild_index')"

inputs:
  query:
    type: str
    description: "Natural language description: 'dark trap kick at 140 BPM'"
    examples: ["dark atmospheric pad", "punchy 808 kick", "rain texture"]
  reference_wav:
    type: Path
    description: "Reference audio file for audio-to-audio similarity"
  top_k:
    type: int
    default: 20
    range: "1–100"
  min_score:
    type: float
    default: 0.0
    description: "Minimum cosine similarity score [0.0–1.0]"

outputs:
  results:
    type: list[dict]
    description: "Samples sorted by similarity score descending"
    schema: |
      [
        {
          "id": 42,
          "filename": "dark_pad_c_minor.wav",
          "instrument": "pad",
          "bpm": 140.0,
          "key": "C min",
          "mood": "dark",
          "energy": "mid",
          "similarity": 0.912,
          "path": "/path/to/file.wav"
        }
      ]

embedding_contract:
  dimension: 512
  dtype: float32
  normalization: L2 (unit vectors)
  similarity: cosine (dot product of unit vectors)
  score_range: "0.0 (unrelated) → 1.0 (identical)"
  threshold_similar: ">= 0.75 (practical for audio search)"

performance:
  cpu_per_file_ms: 50
  m2_mac_mps_ms: 8
  batch_100_cpu_s: 2.0
  search_10k_samples_ms: 1
  search_100k_samples_ms: 5

trigger_keywords:
  - semantic search, find similar, similar samples, CLAP, embedding
  - vector search, FAISS, text-to-audio, audio similarity
  - rebuild index, update index, vector index

trigger_files:
  - "src/samplemind/search/**/*.py"
  - "tests/test_semantic_search.py"

related_skills:
  - search           # keyword search (FTS5)
  - analyze_audio    # audio embeddings are computed during analysis
  - batch_import     # index rebuilt after batch import

related_workflows:
  - add-audio-feature   # when adding new embedding model
  - ci-check

examples:
  - command: "uv run samplemind semantic 'dark atmospheric pad'"
    description: "Find dark pads by text description"
    output: "Top 10 samples sorted by CLAP cosine similarity"

  - command: "uv run samplemind semantic --audio ~/kick.wav --top 5 --json"
    description: "Find 5 samples most similar to a reference kick drum"
    output: "JSON array with similarity scores"

  - command: "uv run samplemind index rebuild"
    description: "Rebuild FAISS index after bulk import"
    output: '{"samples": 4721, "elapsed_s": 28.4, "index_size_mb": 9.2}'

