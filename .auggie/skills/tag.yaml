name: tag
description: >
  Manually tag a sample in the library with genre, mood, energy, and
  custom free-form tags. Tagged fields are never overwritten on re-import.
agent: audio-analyzer
command: "uv run samplemind tag {name} {args}"
inputs:
  - name: name
    type: string
    description: Partial filename to identify the sample (case-insensitive match)
    required: true
  - name: genre
    type: string
    description: Music genre (e.g. trap, lofi, house, dnb, techno)
    required: false
  - name: mood
    type: enum
    values: [dark, chill, aggressive, euphoric, melancholic, neutral]
    required: false
  - name: energy
    type: enum
    values: [low, mid, high]
    description: "⚠ Use 'mid' not 'medium'"
    required: false
  - name: tags
    type: string
    description: "Comma-separated free-form tags (e.g. 'punchy,808,sub')"
    required: false
outputs:
  - updated: Filename of the sample that was tagged
  - fields: List of fields that were updated
model_fields:
  auto_detected:
    - bpm, key, mood, energy, instrument    # overwritten on re-import
  manually_tagged:
    - genre, tags                           # NEVER overwritten on re-import
    - mood, energy can be manually overridden too
validation:
  energy: "Must be 'low', 'mid', or 'high' (never 'medium')"
  mood: "Must be one of: dark, chill, aggressive, euphoric, melancholic, neutral"
examples:
  - "uv run samplemind tag kick_808 --genre trap --energy high"
  - "uv run samplemind tag 'break_loop' --mood aggressive --tags 'break,loop,drum'"
  - "uv run samplemind tag hihat_open --energy low --genre house"
  - "uv run samplemind tag pad_c_minor --mood melancholic --genre lofi"

