name: search
description: >
  Search the SampleMind library with text query and/or metadata filters
  (instrument, energy, mood, BPM range, key). Returns JSON results.
agent: audio-analyzer
command: "uv run samplemind search {args} --json"
inputs:
  - name: query
    type: string
    description: Free-text search term (filename, tag, etc.)
    required: false
  - name: instrument
    type: enum
    values: [loop, hihat, kick, snare, bass, pad, lead, sfx, unknown]
    required: false
  - name: energy
    type: enum
    values: [low, mid, high]
    description: "⚠ Use 'mid' not 'medium'"
    required: false
  - name: mood
    type: enum
    values: [dark, chill, aggressive, euphoric, melancholic, neutral]
    required: false
  - name: bpm_min
    type: int
    description: Minimum BPM (inclusive)
    required: false
  - name: bpm_max
    type: int
    description: Maximum BPM (inclusive)
    required: false
  - name: key
    type: string
    description: 'Musical key, e.g. "C min" or "G maj"'
    required: false
outputs:
  - results: List of matching samples with metadata
  - count: Total matches found
examples:
  - "uv run samplemind search --query kick --json"
  - "uv run samplemind search --instrument hihat --energy low --json"
  - "uv run samplemind search --bpm-min 120 --bpm-max 140 --mood dark --json"
  - "uv run samplemind search --key 'C min' --json"

