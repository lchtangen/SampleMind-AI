name: serve_web
description: >
  Launch the Flask web UI for browsing, searching, and tagging the sample library.
  Includes session auth, audio streaming, and live search via /api/samples.
agent: web-agent
command: "uv run samplemind serve --port {port}"
inputs:
  - name: port
    type: int
    description: Port to bind Flask to
    default: 5000
  - name: debug
    type: flag
    description: Enable Flask debug mode with auto-reload
    default: false
outputs:
  - url: "http://localhost:{port}"
  - pid: Flask process ID
routes:
  - "GET  /             → library view (login required)"
  - "GET  /login        → login page"
  - "POST /login        → authenticate → session cookie"
  - "GET  /register     → register page"
  - "POST /register     → create account"
  - "GET  /logout       → clear session"
  - "GET  /api/samples  → JSON sample list (live search by HTMX)"
  - "POST /api/tag      → update sample tags"
  - "POST /api/import   → trigger folder import"
  - "GET  /api/status   → health check + library stats"
  - "GET  /audio/<id>   → stream WAV file for browser playback"
auth:
  type: session cookie (Flask)
  default_user: first registered account (owner role)
notes:
  - Legacy fallback: "python src/web/app.py"
  - Tauri WebView connects to this at http://127.0.0.1:5174 in dev mode
  - Both Flask and FastAPI can run simultaneously (different ports)
examples:
  - "uv run samplemind serve"
  - "uv run samplemind serve --port 5000"
  - "python src/web/app.py"

