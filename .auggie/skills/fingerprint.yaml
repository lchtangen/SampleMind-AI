name: fingerprint
description: >
  Compute SHA-256 audio fingerprints for deduplication. Checks a single file
  or scans a directory for duplicate samples using first-64KB hashing.
agent: audio-analyzer
command: "uv run samplemind analyze {path} --fingerprint --json"
algorithm:
  method: SHA-256 of first 64 KB
  implementation: |
    import hashlib
    from pathlib import Path

    def fingerprint_file(path: Path) -> str:
        with open(path, "rb") as f:
            return hashlib.sha256(f.read(65536)).hexdigest()

    def find_duplicates(paths: list[Path]) -> dict[str, list[Path]]:
        groups: dict[str, list[Path]] = {}
        for path in paths:
            fp = fingerprint_file(path)
            groups.setdefault(fp, []).append(path)
        return {fp: ps for fp, ps in groups.items() if len(ps) > 1}
inputs:
  - name: path
    type: path
    description: File or directory to fingerprint
    required: true
  - name: check_db
    type: flag
    description: Check the library DB for existing duplicates
    default: true
outputs:
  - fingerprint: SHA-256 hex digest (64 chars)
  - short: First 16 + last 8 chars for display
  - duplicates: List of duplicate file paths (if any found)
  - is_duplicate: Boolean — file already exists in library
notes:
  - First 64 KB is sufficient for deduplication of audio files
  - Hash is stored in DB alongside analysis metadata
  - Duplicate detection prevents re-importing the same file
examples:
  - "uv run samplemind analyze kick.wav --fingerprint --json"
  - "uv run samplemind import samples/ --dedupe --json"

trigger_keywords:
  - fingerprint, SHA-256, deduplicate, duplicate detection, dedup
  - fingerprint_file, sha256, 64KB, hashlib, duplicate samples
  - find duplicates, remove duplicates, same file

trigger_files:
  - "src/samplemind/analyzer/fingerprint.py"
  - "src/samplemind/data/repositories/sample_repository.py"
  - "tests/test_fingerprint.py"

related_skills: [analyze_audio, batch_import, list_samples]
related_workflows: [add-audio-feature]

