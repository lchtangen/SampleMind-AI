name: check
description: >
  Full CI suite: ruff lint + format, pytest with coverage, cargo clippy.
  Equivalent to what GitHub Actions ci.yml runs. Use before every commit.
agent: test-runner
steps:
  1_ruff_lint:
    command: "uv run ruff check src/ tests/"
    fix_command: "uv run ruff check --fix src/ tests/"
    label: "Python lint (ruff)"
  2_ruff_format:
    command: "uv run ruff format --check src/ tests/"
    fix_command: "uv run ruff format src/ tests/"
    label: "Python format (ruff)"
  3_pytest:
    command: "uv run pytest tests/ -v --tb=short -n auto"
    fallback: "uv run pytest tests/ -v --tb=short"
    label: "Python tests (pytest)"
  4_coverage:
    command: "uv run pytest tests/ --cov=samplemind --cov-report=term-missing --cov-fail-under=60 -q"
    label: "Coverage check (≥60%)"
  5_clippy:
    command: "cargo clippy --manifest-path app/src-tauri/Cargo.toml -- -D warnings"
    label: "Rust lint (clippy)"
    skip_flag: fast
inputs:
  - name: fix
    type: flag
    description: Auto-fix ruff issues and reformat
    default: false
  - name: fast
    type: flag
    description: Skip cargo clippy (faster when Rust unchanged)
    default: false
  - name: coverage
    type: flag
    description: Show per-file coverage breakdown
    default: false
outputs:
  - step_results: Pass/fail status for each step
  - overall: PASS or FAIL
  - failed_tests: List of failed test names
  - coverage_report: Per-module coverage percentages
examples:
  - "uv run ruff check src/ && uv run pytest tests/ -v && cargo clippy --manifest-path app/src-tauri/Cargo.toml -- -D warnings"
  - "uv run pytest tests/ --cov=samplemind --cov-report=term-missing"

