name: build
description: >
  Build the Tauri desktop app, Python wheel, PyInstaller sidecar, or JUCE plugin.
  Routes to the correct build command based on the target argument.
agent: tauri-builder
commands:
  dev: "cd app && pnpm tauri dev"
  release: "cd app && pnpm tauri build"
  universal: "cd app && pnpm tauri build --target universal-apple-darwin"
  windows: "cd app && pnpm tauri build --target x86_64-pc-windows-msvc"
  python: "uv build"
  sidecar: "uv run pyinstaller samplemind-server.spec --noconfirm"
  plugin: "cd plugin && cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build"
  check: "pnpm --version && cargo --version && uv --version && cmake --version"
inputs:
  - name: target
    type: enum
    values: [dev, release, universal, windows, python, sidecar, plugin, check]
    description: What to build
    default: dev
outputs:
  - artifact_path: Location of built artifact
  - sha256: SHA-256 of sidecar binary (for release builds)
requires_confirmation:
  - release
  - universal
  - windows
  - sidecar
pre_checks:
  - command: "pnpm --version"
    for_targets: [dev, release, universal, windows]
  - command: "cargo --version"
    for_targets: [dev, release, universal, windows]
  - exists: "app/node_modules"
    message_if_missing: "Run: cd app && pnpm install"
post_actions:
  sidecar: >
    Copy to app/src-tauri/binaries/ and generate SHA-256:
    sha256sum dist/samplemind-server > app/src-tauri/resources/samplemind-server.sha256
  universal: >
    Verify: lipo -info app/src-tauri/target/universal-apple-darwin/release/bundle/macos/SampleMind.app/Contents/MacOS/SampleMind
examples:
  - "cd app && pnpm tauri dev"
  - "cd app && pnpm tauri build"
  - "cd app && pnpm tauri build --target universal-apple-darwin"
  - "uv run pyinstaller samplemind-server.spec --noconfirm"

trigger_keywords:
  - Tauri build, pnpm tauri, cargo build, Universal Binary, build the app
  - pnpm tauri dev, pnpm tauri build, build error, Cargo compile
  - PyInstaller, sidecar bundle, --target universal-apple-darwin
  - release build, production build, tauri::Builder

trigger_files:
  - "app/src-tauri/Cargo.toml"
  - "app/src-tauri/tauri.conf.json"
  - "app/package.json"
  - ".github/workflows/release.yml"

related_skills: [check, lint]
related_workflows: [ci-check, release]

