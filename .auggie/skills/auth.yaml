name: auth
description: >
  Manage user authentication: register accounts, login to get JWT tokens,
  refresh tokens, inspect RBAC roles and permissions.
agent: security-agent
commands:
  register: |
    curl -X POST http://localhost:8000/api/v1/auth/register \
      -H 'Content-Type: application/json' \
      -d '{"email": "{email}", "username": "{username}", "password": "{password}"}'
  login: |
    curl -X POST http://localhost:8000/api/v1/auth/login \
      -d 'username={username}&password={password}'
  refresh: |
    curl -X POST http://localhost:8000/api/v1/auth/refresh \
      -H 'Content-Type: application/json' \
      -d '{"refresh_token": "{refresh_token}"}'
  me: |
    curl -H 'Authorization: Bearer {access_token}' \
      http://localhost:8000/api/v1/auth/me
  health: "curl http://localhost:8000/api/v1/health"
jwt_config:
  algorithm: HS256
  access_token_expires: 30 minutes
  refresh_token_expires: 7 days
  secret_key_env: SAMPLEMIND_SECRET_KEY
rbac_roles:
  viewer:
    description: Read-only access (shared library)
    permissions: [audio:read, search:basic]
  member:
    description: Standard single user
    permissions: [audio:read/write/delete/analyze/batch, search:*, pack:*, api:key_create]
  owner:
    description: Full local library access (default for new accounts)
    permissions: member + [api:key_revoke]
  admin:
    description: Administrative operations
    permissions: all
password_rules:
  min_length: 8
  requires: [uppercase, lowercase, digit]
token_response_schema:
  access_token: str    # JWT — use in Authorization: Bearer header
  refresh_token: str   # opaque — use in /auth/refresh body
  token_type: bearer
  expires_in: 1800     # seconds (30 min)
security_notes:
  - "Never hardcode SECRET_KEY — always use SAMPLEMIND_SECRET_KEY env var"
  - "Default secret ('change-me-before-deployment...') is INSECURE — override in production"
  - "Tokens are stateless — logout is client-side only (delete the token)"
  - "OAuth2 providers (Google, GitHub) require GOOGLE_CLIENT_ID etc. env vars"
examples:
  - "curl -X POST http://localhost:8000/api/v1/auth/register -H 'Content-Type: application/json' -d '{\"email\":\"user@example.com\",\"username\":\"user\",\"password\":\"SecurePass1\"}'"
  - "curl http://localhost:8000/api/v1/health"

trigger_keywords:
  - JWT, token, auth, register, login, refresh, RBAC, UserRole, Permission
  - bcrypt, password, RBACService, OAuth2, secret key, access_token, Bearer
  - api/auth, jwt_handler, auth/register, auth/login, auth/me, auth/refresh
  - create_access_token, decode_token, SAMPLEMIND_SECRET_KEY

trigger_files:
  - "src/samplemind/core/auth/jwt_handler.py"
  - "src/samplemind/core/auth/rbac.py"
  - "src/samplemind/core/auth/dependencies.py"
  - "src/samplemind/api/routes/auth.py"
  - "src/samplemind/core/models/user.py"

related_skills: [serve_api, health_check]
related_workflows: [dev-start, ci-check]

