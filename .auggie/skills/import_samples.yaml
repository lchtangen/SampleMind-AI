name: import_samples
description: >
  Import and analyze a folder of WAV/AIFF samples into the SampleMind library.
  Runs feature extraction (BPM, key, instrument, mood, energy) and stores
  results in the SQLite database. Supports parallel workers.
agent: audio-analyzer
command: "uv run samplemind import {folder} --workers {workers} --json"
inputs:
  - name: folder
    type: path
    description: Directory containing WAV/AIFF/AIF files to import
    required: true
  - name: workers
    type: int
    description: Parallel worker count (0 = auto, uses cpu_count)
    default: 0
  - name: recursive
    type: flag
    description: Scan subdirectories recursively
    default: false
  - name: dry_run
    type: flag
    description: Show what would be imported without writing to DB
    default: false
outputs:
  - imported: Number of samples successfully imported
  - skipped: Number of duplicates skipped (fingerprint match)
  - errors: Files that failed analysis
  - elapsed: Total time in seconds
notes:
  - Duplicate detection uses SHA-256 fingerprint of first 64 KB
  - Classifier values stored: energy (low/mid/high), mood (6 values), instrument (9 values)
  - JSON output goes to stdout; progress goes to stderr
  - Legacy fallback: "python src/main.py import {folder}"
examples:
  - "uv run samplemind import ~/Music/Samples/ --workers 4 --json"
  - "uv run samplemind import samples/ --json"
  - "uv run samplemind import ~/Packs/808s/ --workers 0 --json"

