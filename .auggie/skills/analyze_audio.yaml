# ══════════════════════════════════════════════════════════════════════════════
# Skill: analyze_audio
# Extracts all 9 audio features from a WAV/AIFF file using librosa.
# ══════════════════════════════════════════════════════════════════════════════

name: analyze_audio
description: >
  Extract all audio features (BPM, key, RMS, centroid, ZCR, flatness, rolloff,
  onset, low_freq_ratio, duration) and run classifiers (energy, instrument, mood)
  for a single WAV or AIFF file. Outputs a JSON feature dict.
agent: audio-analyzer
command: "uv run samplemind analyze {path} --json"

inputs:
  path:
    type: string
    required: true
    description: "Absolute or relative path to a WAV or AIFF file"
  workers:
    type: int
    required: false
    default: 1
    description: "Number of parallel workers (>1 uses batch mode)"

outputs:
  format: json
  fields:
    filename:      { type: string,  example: "kick_808.wav" }
    path:          { type: string,  example: "/home/ubuntu/Music/kick_808.wav" }
    bpm:           { type: float,   example: 140.0, note: "librosa beat_track" }
    key:           { type: string,  example: "C min" }
    rms:           { type: float,   example: 0.072, note: "sqrt(mean(y**2)) — NOT librosa.feature.rms()" }
    centroid_norm: { type: float,   example: 0.143, note: "normalized to 0–1" }
    zcr:           { type: float,   example: 0.043 }
    flatness:      { type: float,   example: 0.031 }
    rolloff_norm:  { type: float,   example: 0.298 }
    onset_mean:    { type: float,   example: 3.2 }
    onset_max:     { type: float,   example: 5.1 }
    low_freq_ratio:{ type: float,   example: 0.41 }
    duration:      { type: float,   example: 0.48, note: "seconds" }
    energy:        { type: string,  example: "high",    enum: [low, mid, high] }
    instrument:    { type: string,  example: "kick",    enum: [loop, hihat, kick, snare, bass, pad, lead, sfx, unknown] }
    mood:          { type: string,  example: "dark",    enum: [dark, chill, aggressive, euphoric, melancholic, neutral] }
    sha256:        { type: string,  example: "a3f2...", note: "SHA-256 of first 64 KB (fingerprint)" }

classifier_thresholds:
  energy:
    low:  "rms < 0.015"
    mid:  "rms < 0.060"
    high: "rms >= 0.060"
  instrument_priority_order:
    1_loop:   "dur > 2.0 AND onset_mean > 0.8"
    2_hihat:  "flat > 0.2 AND zcr > 0.1 AND rolloff > 0.3 AND dur < 1.0"
    3_kick:   "lfr > 0.35 AND onset_max > 4.0 AND dur < 0.8 AND zcr < 0.08"
    4_snare:  "onset_max > 3.0 AND flat > 0.05 AND dur < 0.8 AND lfr < 0.35"
    5_bass:   "lfr > 0.3 AND flat < 0.05 AND dur > 0.3"
    6_pad:    "dur > 1.5 AND onset_mean < 1.5 AND centroid > 0.08"
    7_lead:   "centroid > 0.15 AND flat < 0.1 AND dur < 3.0"
    8_sfx:    "flat > 0.1"
    9_unknown: "(none matched)"
  mood_priority_order:
    1_aggressive: "zcr > 0.08 AND onset_mean > 3.0 AND centroid > 0.15"
    2_dark:       "centroid < 0.12 AND minor_key"
    3_melancholic:"minor_key AND rms < 0.03 AND onset_mean < 1.5"
    4_chill:      "centroid < 0.15 AND rms < 0.05 AND onset_mean < 2.0"
    5_euphoric:   "major_key AND centroid > 0.12 AND rms > 0.02"
    6_neutral:    "(none matched)"

examples:
  - description: "Analyze a single kick drum"
    command: "uv run samplemind analyze ~/Music/kick_808.wav --json"
    expected_output: '{"instrument": "kick", "energy": "high", "mood": "dark", "bpm": 140.0}'

  - description: "Analyze a pad and check mood"
    command: "uv run samplemind analyze ~/Music/pad_c_min.wav --json"
    expected_output: '{"instrument": "pad", "energy": "low", "mood": "melancholic"}'

  - description: "Debug wrong classification"
    command: "uv run samplemind analyze ~/Music/unknown.wav --json | python -m json.tool"
    note: "Compare rms/zcr/flatness against classifier_thresholds above"

trigger_keywords:
  - analyze, feature extraction, BPM detection, key detection
  - wrong classification, why is this classified, classifier debug
  - librosa, spectral, centroid, ZCR, flatness, onset, rms
  - analyze_audio, analyze_file, audio_analysis.py
  - mood, energy, instrument, kick, hihat, snare, bass, pad, lead, sfx

trigger_files:
  - "src/samplemind/analyzer/audio_analysis.py"
  - "src/samplemind/analyzer/classifier.py"
  - "src/analyzer/audio_analysis.py"
  - "tests/test_audio_analysis.py"
  - "tests/test_classifier.py"

related_skills: [batch_import, fingerprint, coverage]
related_workflows: [debug-classifier, add-audio-feature]

