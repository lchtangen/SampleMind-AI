# ══════════════════════════════════════════════════════════════════════════════
# Auggie CLI — VSCode Integration Guide
# Tells Auggie how to use .vscode/ config, tasks, debugging, and extensions.
# ══════════════════════════════════════════════════════════════════════════════

name: vscode
description: >
  VSCode-specific Auggie configuration. Maps editor tasks, debug configs,
  keyboard shortcuts, and extension integrations to Auggie skills/workflows.

# ── Relevant .vscode/ files ────────────────────────────────────────────────────
config_files:
  settings: .vscode/settings.json      # formatter, linter, Rust analyzer, test runner
  tasks: .vscode/tasks.json            # build/test/serve tasks (Ctrl+Shift+B)
  extensions: .vscode/extensions.json  # recommended + unwanted extensions
  launch: .vscode/launch.json          # debug configurations (F5)

# ── VSCode task → Auggie skill mapping ────────────────────────────────────────
task_to_skill:
  "Python [uv]: Run Tests": run_tests
  "Python [uv]: Run Tests (fast)": run_tests
  "Python [uv]: Ruff Lint": lint
  "Python [uv]: Ruff Format": lint
  "Python [uv]: Full CI Check": check
  "Python [uv]: Serve Web UI": serve_web
  "Tauri: Dev (pnpm)": build (target=dev)
  "Tauri: Build (pnpm)": build (target=release)
  "Rust: Clippy": lint
  "Sidecar: Start": sidecar
  "DB: Alembic Upgrade Head": db_migrate
  "JUCE: Build Plugin": build (target=plugin)

# ── Keyboard shortcuts to know ────────────────────────────────────────────────
shortcuts:
  run_task: "Ctrl+Shift+B    → run default build task (Full CI Check)"
  command_palette: "Ctrl+Shift+P  → access all VSCode commands"
  run_tests_sidebar: "Ctrl+Shift+P → Python: Run All Tests"
  toggle_terminal: "Ctrl+`         → open integrated terminal"
  format_file: "Shift+Alt+F    → format current file (ruff)"
  go_to_definition: "F12           → jump to function/class definition"
  peek_definition: "Alt+F12       → inline definition preview"
  find_references: "Shift+F12     → find all usages"
  debug_start: "F5             → start debugging (launch.json config)"
  debug_stop: "Shift+F5       → stop debugger"
  debug_step: "F10            → step over"
  breakpoint: "F9             → toggle breakpoint"

# ── Python interpreter setup ──────────────────────────────────────────────────
python_interpreter:
  path: "${workspaceFolder}/.venv/bin/python"
  set_command: "Ctrl+Shift+P → Python: Select Interpreter → .venv"
  verify: "uv sync (creates .venv if missing)"

# ── Testing integration ────────────────────────────────────────────────────────
testing:
  framework: pytest
  test_path: tests/
  args: ["-v", "--tb=short"]
  run_all: "Ctrl+Shift+P → Python: Run All Tests"
  run_file: "Right-click test file → Run Python File in Terminal"
  run_test: "Click ▶ gutter icon next to test function"
  coverage: "Run in terminal: uv run pytest --cov=samplemind --cov-report=term-missing"

# ── Ruff lint integration ─────────────────────────────────────────────────────
ruff:
  extension: charliermarsh.ruff
  format_on_save: true    # configured in settings.json
  fix_on_save: true       # source.fixAll.ruff
  organize_imports_on_save: true  # source.organizeImports.ruff
  manual_run: "Ctrl+Shift+P → Format Document"

# ── Rust Analyzer ────────────────────────────────────────────────────────────
rust_analyzer:
  linked_project: app/src-tauri/Cargo.toml
  check_command: clippy
  check_extra_args: ["-D", "warnings"]
  inline_hints: enabled
  format_on_save: true    # rustfmt

# ── Extensions (key ones) ─────────────────────────────────────────────────────
extensions:
  critical:
    - charliermarsh.ruff          # Python lint + format
    - ms-python.python            # Python IntelliSense + test runner
    - ms-python.vscode-pylance    # Pyright language server
    - rust-lang.rust-analyzer     # Rust IntelliSense
  recommended:
    - svelte.svelte-vscode        # Svelte 5 (Phase 6 frontend)
    - tauri-apps.tauri-vscode     # Tauri helper
    - tamasfe.even-better-toml    # pyproject.toml, Cargo.toml
    - usernamehw.errorlens        # Inline error display
    - github.copilot              # AI code completion
  install_all: "Ctrl+Shift+P → Extensions: Show Recommended Extensions"

