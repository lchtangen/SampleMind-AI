# ══════════════════════════════════════════════════════════════════════════════
# Workflow: api-test
# Start the FastAPI server and run a full manual + automated API test suite.
# Agent: api-agent
# ══════════════════════════════════════════════════════════════════════════════

name: api-test
description: >
  Complete API testing workflow: start FastAPI → verify health → run auth flow →
  test all endpoints → run pytest API tests → check OpenAPI schema.
agent: api-agent
trigger_keywords: [api test, FastAPI test, REST API test, test endpoints, auth flow]

steps:
  1_start_server:
    name: "Start FastAPI server"
    command: "uv run samplemind api --reload &"
    health_check: "curl -sf http://localhost:8000/api/v1/health"
    expected: '{"status": "ok", "version": "x.y.z"}'
    wait: "sleep 3  # wait for uvicorn startup"
    stop_if: "Health check fails after 10s — check logs for import errors"

  2_auth_flow:
    name: "Run full JWT auth flow"
    commands:
      register: |
        curl -s -X POST http://localhost:8000/api/v1/auth/register \
          -H 'Content-Type: application/json' \
          -d '{"email":"test@test.com","username":"testuser","password":"TestPass1"}' \
          | python -m json.tool
      login: |
        curl -s -X POST http://localhost:8000/api/v1/auth/login \
          -d 'username=testuser&password=TestPass1' | python -m json.tool
        # → save access_token from response
      me: |
        curl -s -H 'Authorization: Bearer {access_token}' \
          http://localhost:8000/api/v1/auth/me | python -m json.tool
      refresh: |
        curl -s -X POST http://localhost:8000/api/v1/auth/refresh \
          -H 'Content-Type: application/json' \
          -d '{"refresh_token": "{refresh_token}"}' | python -m json.tool
    expected:
      register: "UserPublic JSON with id, email, username, role='owner'"
      login:    "TokenResponse with access_token, refresh_token, expires_in=1800"
      me:       "UserPublic JSON"
      refresh:  "New access_token"

  3_endpoint_smoke_tests:
    name: "Smoke test all registered endpoints"
    commands:
      health:     "curl -s http://localhost:8000/api/v1/health | python -m json.tool"
      openapi:    "curl -s http://localhost:8000/api/docs | grep -c 'swagger'"
      protected:  "curl -s http://localhost:8000/api/v1/auth/me  # should return 401 without token"
    expected:
      health:    '{"status": "ok"}'
      openapi:   "swagger found in HTML"
      protected: '{"detail": "Not authenticated"} with HTTP 401'

  4_pytest_api:
    name: "Run FastAPI pytest tests"
    commands:
      - "uv run pytest tests/test_api.py -v --tb=short"
      - "uv run pytest tests/test_auth.py -v --tb=short"
    fixture: |
      # tests/conftest.py
      @pytest.fixture
      def client():
          from samplemind.api.main import create_app
          app = create_app()
          from fastapi.testclient import TestClient
          return TestClient(app)

      @pytest.fixture
      def auth_headers(client):
          client.post("/api/v1/auth/register",
              json={"email": "t@t.com", "username": "t", "password": "TestPass1"})
          resp = client.post("/api/v1/auth/login",
              data={"username": "t", "password": "TestPass1"})
          token = resp.json()["access_token"]
          return {"Authorization": f"Bearer {token}"}
    test_template: |
      def test_get_me(client, auth_headers):
          resp = client.get("/api/v1/auth/me", headers=auth_headers)
          assert resp.status_code == 200
          assert resp.json()["username"] == "t"

  5_openapi_schema_check:
    name: "Validate OpenAPI schema"
    commands:
      - "curl -s http://localhost:8000/api/openapi.json | python -m json.tool > /tmp/openapi.json"
      - "python -c \"import json; s=json.load(open('/tmp/openapi.json')); print(list(s['paths'].keys()))\""
    expected: "All registered routes appear in paths"

  6_cleanup:
    name: "Stop the test server"
    command: "pkill -f 'samplemind api' || true"

security_checks:
  - "Unauthenticated requests to protected endpoints return HTTP 401"
  - "Wrong password returns HTTP 401 (not 500)"
  - "Expired token returns HTTP 401"
  - "Missing Authorization header returns HTTP 403 or 401"
  - "hashed_password never appears in any API response"

password_rules:
  minimum: "8 characters"
  requires: "1 uppercase, 1 lowercase, 1 digit"
  rejected: "TestPass → 422 (no digit)"

