# ══════════════════════════════════════════════════════════════════════════════
# Workflow: semantic-index
# Rebuild or update the FAISS semantic search index.
# Agent: phase-11-semantic-search
# ══════════════════════════════════════════════════════════════════════════════

name: semantic-index
description: >
  Rebuild or incrementally update the FAISS vector index for semantic search.
  Run after bulk import, model changes, or when search quality degrades.
agent: phase-11-semantic-search

steps:
  - name: verify_feature_flag
    description: Confirm semantic search is enabled
    commands:
      - "python -c \"from samplemind.core.feature_flags import is_enabled; print(is_enabled('semantic_search'))\""
    expected: "True"
    if_false: |
      Enable: echo '{"semantic_search": {"enabled": true}}' > ~/.samplemind/flags.json

  - name: check_dependencies
    description: Verify CLAP and FAISS are installed
    commands:
      - "uv run python -c 'import faiss; import msclap; print(\"OK\")'"
    if_failed: |
      Install: uv add faiss-cpu msclap sentence-transformers
      GPU: uv add faiss-gpu  (for libraries > 100k samples)

  - name: check_library_size
    description: Count samples to estimate rebuild time
    commands:
      - "uv run samplemind list --json | python -c 'import json,sys; d=json.load(sys.stdin); print(f\"{d[\\\"total\\\"]} samples (~{d[\\\"total\\\"] * 50 // 1000}s CPU / {d[\\\"total\\\"] * 8 // 1000}s MPS\")'"
    expected: "Shows sample count and estimated rebuild time"

  - name: rebuild_index
    description: Rebuild complete FAISS index (downloads CLAP model on first run ~900MB)
    commands:
      - "uv run samplemind index rebuild --workers 4 --json"
    expected: '{"samples": N, "elapsed_s": T, "index_size_mb": M}'
    notes:
      - "First run: downloads ~900MB CLAP model to ~/.cache/huggingface/"
      - "Subsequent runs: model is cached, only embedding time"
      - "--workers 4 uses 4 threads for audio loading (not for CLAP — it's single-threaded)"

  - name: verify_search
    description: Test a sample search to confirm index works
    commands:
      - "uv run samplemind semantic 'kick drum' --top 5 --json"
    expected: "Returns 5 results with similarity scores > 0"
    success_criteria:
      - "results count > 0"
      - "all scores between 0.0 and 1.0"
      - "results sorted by score descending"

  - name: run_tests
    description: Verify search tests pass (mocked — no model downloads)
    commands:
      - "uv run pytest tests/test_semantic_search.py -m 'not slow' -v"
    expected: "All tests pass"

safety_rules:
  - "Old index remains usable until new index is saved (atomic swap)"
  - "Index is read-only during search — safe for concurrent reads"
  - "Incremental add_batch() for < 100 new samples; full rebuild for > 100"
  - "Never delete the index while search is active"

performance_tuning:
  small_library:   "< 10k samples: IndexFlatIP (exact), any speed"
  medium_library:  "10k–100k: IndexFlatIP (< 5ms search)"
  large_library:   "> 100k: upgrade to IndexIVFFlat with nlist=256"
  very_large:      "> 1M: IndexIVFFlat + GPU (faiss-gpu)"

