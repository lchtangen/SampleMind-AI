# ══════════════════════════════════════════════════════════════════════════════
# Workflow: db-migration
# Safely create and apply an Alembic database schema migration.
# Agent: phase-03-database
# ══════════════════════════════════════════════════════════════════════════════

name: db-migration
description: >
  Create, review, and apply an Alembic database schema migration safely.
  Covers the full cycle: edit SQLModel model → autogenerate migration →
  review → apply → verify → write test.
agent: phase-03-database
trigger_keywords: [alembic, migration, schema change, add column, add table, db migrate]

steps:
  1_verify_current:
    name: "Verify current migration state"
    commands:
      - "uv run alembic current"
      - "uv run alembic history --verbose"
    expected: "Shows current revision hash and history"
    stop_if: "Alembic reports error — fix before proceeding"

  2_edit_model:
    name: "Edit the SQLModel model"
    instructions: |
      Modify the relevant model in src/samplemind/core/models/*.py
      Rules:
        - All columns must have type annotations
        - Optional columns: Optional[T] = None
        - energy values: 'low'/'mid'/'high' ONLY (never 'medium')
        - instrument values: see classifier.py for full enum
      Example:
        class Sample(SampleBase, table=True):
            new_column: Optional[str] = Field(default=None, index=True)

  3_generate_migration:
    name: "Auto-generate migration"
    command: "uv run alembic revision --autogenerate -m '{description}'"
    example: "uv run alembic revision --autogenerate -m 'add_genre_column_to_samples'"
    output: "migrations/versions/<hash>_add_genre_column_to_samples.py"
    review_checklist:
      - "op.add_column name matches model field name"
      - "op.drop_column in downgrade() matches the add_column"
      - "No unintended table drops"
      - "Foreign key constraints are handled"

  4_review_migration:
    name: "Review the generated migration file"
    command: "cat migrations/versions/$(ls -t migrations/versions/ | head -1)"
    must_contain:
      - "def upgrade()"
      - "def downgrade()"
    must_not_contain:
      - "op.drop_table"       # unless intentional
      - "op.drop_column('samples',"  # protect samples table

  5_apply_migration:
    name: "Apply migration to database"
    command: "uv run alembic upgrade head"
    verify: "uv run alembic current   # must show new revision hash"
    rollback: "uv run alembic downgrade -1   # if something goes wrong"
    note: "This modifies the live DB — make sure you have a backup if production"

  6_verify_schema:
    name: "Verify schema was applied"
    commands:
      - "uv run python -c \"from samplemind.data.orm import get_engine; from sqlmodel import inspect; print([c['name'] for c in inspect(get_engine()).get_columns('samples')])\""
      - "uv run samplemind list --json | head -3"
    expected: "New column appears in schema and CLI output"

  7_write_test:
    name: "Write a migration smoke test"
    template: |
      # tests/test_migration_<name>.py
      def test_migration_<name>(db_session):
          """Verify <column> column exists and accepts valid values."""
          sample = SampleCreate(filename="test.wav", path="/tmp/test.wav", <new_column>="<value>")
          db_session.add(Sample.from_orm(sample))
          db_session.commit()
          result = db_session.exec(select(Sample)).first()
          assert result.<new_column> == "<value>"
    db_fixture: |
      # Use in-memory DB always:
      engine = create_engine("sqlite://")
      SQLModel.metadata.create_all(engine)
      with Session(engine) as s: yield s

  8_lint_and_test:
    name: "Lint and run tests"
    commands:
      - "uv run ruff check src/ migrations/"
      - "uv run pytest tests/ -m 'not slow' -n auto --tb=short -q"

safety_rules:
  - "Never use alembic upgrade head in production without testing on a copy first"
  - "Always review autogenerated migration before applying"
  - "Test rollback: uv run alembic downgrade -1 && uv run alembic upgrade head"
  - "Never hardcode classifier enum values in migrations — use strings"

