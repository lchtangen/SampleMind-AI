# ══════════════════════════════════════════════════════════════════════════════
# Auggie CLI — SampleMind-AI Project Settings
# Dev: Windows WSL2  |  Production target: macOS 12+ Universal Binary
# ══════════════════════════════════════════════════════════════════════════════

project:
  name: SampleMind-AI
  version: "0.1.0"
  description: AI-powered audio sample library manager for FL Studio
  languages: [python, rust, svelte, typescript]
  workspace_type: monorepo
  default_agent: audio-analyzer
  active_environment: dev       # switch to "prod" when building for macOS release

# ── CLI behaviour ─────────────────────────────────────────────────────────────
cli:
  enable_autocomplete: true
  color_output: true
  verbose: false
  api_key_env: ANTHROPIC_API_KEY

# ── Model routing (per task complexity) ──────────────────────────────────────
models:
  default: claude-sonnet-4-5         # balanced speed + quality for most tasks
  fast: claude-haiku-3-5             # quick lookups, single-file edits
  deep: claude-opus-4                # complex multi-file refactors, architecture
  # Per-agent overrides (set in agents.yaml; listed here for reference):
  #   audio-analyzer  → sonnet   (analysis logic, classifier thresholds)
  #   tauri-builder   → sonnet   (Rust + Svelte cross-cutting changes)
  #   doc-writer      → haiku    (prose-heavy, low risk)
  #   test-runner     → sonnet   (fixture design, coverage analysis)
  #   phase-10-production → opus (signing, notarization — high stakes)

# ── Parallel execution ────────────────────────────────────────────────────────
performance:
  max_parallel_agents: 4
  batch_workers_default: 0           # 0 = auto (cpu_count)
  cache_analysis_results: true
  cache_ttl_seconds: 3600            # 1 hour for analysis cache
  progress_reporting: rich           # rich | plain | json

# ── Phase tracking (current development state) ────────────────────────────────
phases:
  current: 3                         # update as phases complete
  completed: [1, 2]
  in_progress: [3]
  planned: [4, 5, 6, 7, 8, 9, 10]
  # 1=Foundation  2=AudioAnalysis  3=Database  4=CLI  5=Web
  # 6=Desktop  7=FLStudio  8=VST  9=SamplePacks  10=Production

# ── Project layout (monorepo paths) ──────────────────────────────────────────
paths:
  python_src: src/samplemind
  python_legacy: src
  tests: tests
  app_frontend: app/src
  app_rust: app/src-tauri
  plugin: plugin
  docs_en: docs/en
  docs_no: docs/no
  scripts: scripts
  migrations: migrations
  # Runtime paths (resolved at execution time via platformdirs):
  db_dev: "~/.samplemind/library.db"
  db_prod: "~/Library/Application Support/SampleMind/samplemind.db"
  sidecar_socket: /tmp/samplemind.sock

# ── FL Studio integration paths ───────────────────────────────────────────────
fl_studio:
  macos:
    samples_fl20: "~/Documents/Image-Line/FL Studio/Data/Patches/Samples/SampleMind"
    samples_fl21: "~/Documents/Image-Line/FL Studio 21/Data/Patches/Samples/SampleMind"
    au_plugin: "~/Library/Audio/Plug-Ins/Components/SampleMind.component"
    vst3_plugin: "~/Library/Audio/Plug-Ins/VST3/SampleMind.vst3"
  windows:
    samples_fl20: "C:/Users/%USERNAME%/Documents/Image-Line/FL Studio/Data/Patches/Samples/SampleMind"
    samples_fl21: "C:/Users/%USERNAME%/Documents/Image-Line/FL Studio 21/Data/Patches/Samples/SampleMind"

# ── Tool permissions (what Auggie can run automatically) ─────────────────────
tools:
  auto_run:
    - "uv run ruff check src/"
    - "uv run ruff format --check src/"
    - "uv run pytest tests/ -v --tb=short -m 'not slow'"
    - "uv run samplemind --help"
    - "cargo clippy --manifest-path app/src-tauri/Cargo.toml -- -D warnings"
  require_confirmation:
    - "uv run alembic upgrade head"
    - "uv run alembic downgrade"
    - "cd app && pnpm tauri build"
    - "uv run pyinstaller"
    - "git commit"
    - "git push"
  never_run:
    - "rm -rf"
    - "DROP TABLE"
    - "git push --force"

# ── Code quality gates ────────────────────────────────────────────────────────
quality:
  coverage_minimum: 60               # fail_under in pyproject.toml
  coverage_targets:
    analyzer: 80
    classifier: 90
    cli: 70
    data: 75
  lint_tool: ruff                    # never black / flake8 / pylint
  format_tool: ruff
  rust_lint: clippy
  package_manager_python: uv
  package_manager_node: pnpm

# ── Classifier output contract (exact strings — never deviate) ────────────────
classifier_values:
  energy: [low, mid, high]           # ⚠ NOT "medium"
  mood: [dark, chill, aggressive, euphoric, melancholic, neutral]
  instrument: [loop, hihat, kick, snare, bass, pad, lead, sfx, unknown]

# ── IPC contract (stdout/stderr split) ───────────────────────────────────────
ipc:
  json_to: stdout                    # machine-readable output → stdout only
  text_to: stderr                    # human-readable output → stderr only
  json_flag: --json                  # CLI flag that enables JSON mode

# ── Service endpoints (running services map) ──────────────────────────────────
services:
  flask_web:
    port: 5000
    url: "http://localhost:5000"
    start: "uv run samplemind serve --port 5000"
    health: "GET http://localhost:5000/api/status"
    note: "Legacy entrypoint: python src/web/app.py"
  flask_tauri_dev:
    port: 5174
    url: "http://127.0.0.1:5174"
    note: "Tauri dev mode uses this port — set FLASK_PORT=5174 or use scripts/start.sh"
  fastapi:
    port: 8000
    url: "http://localhost:8000"
    docs: "http://localhost:8000/api/docs"
    start: "uv run samplemind api --reload"
    health: "GET http://localhost:8000/api/v1/health"
  tauri_vite:
    port: 1420
    url: "http://localhost:1420"
    note: "Vite HMR server (auto-started by pnpm tauri dev)"
  sidecar_socket:
    path: /tmp/samplemind.sock
    start: "uv run python src/samplemind/sidecar/server.py --socket /tmp/samplemind.sock &"
    ping: "echo '{\"version\": 1, \"action\": \"ping\"}' | nc -U /tmp/samplemind.sock"

# ── CLI commands reference (all available Typer commands) ─────────────────────
cli_commands:
  import: "uv run samplemind import <folder> [--workers N] [--json]"
  analyze: "uv run samplemind analyze <folder> [--json]"
  list: "uv run samplemind list [--key KEY] [--bpm-min N] [--bpm-max N] [--json]"
  search: "uv run samplemind search [query] [--instrument X] [--energy X] [--mood X] [--json]"
  tag: "uv run samplemind tag <name> [--genre X] [--mood X] [--energy X] [--tags X]"
  serve: "uv run samplemind serve [--port N]"
  api: "uv run samplemind api [--host X] [--port N] [--reload]"
  version: "uv run samplemind version"
  legacy: "python src/main.py <command>    # legacy argparse — required by Tauri dev mode"

# ── Auth / security configuration ────────────────────────────────────────────
auth:
  jwt_algorithm: HS256
  access_token_expires_minutes: 30
  refresh_token_expires_days: 7
  secret_key_env: SAMPLEMIND_SECRET_KEY
  flask_secret_env: FLASK_SECRET_KEY
  rbac_roles: [viewer, member, owner, admin]
  default_role: owner    # first registered user gets owner
  oauth_providers: [google, github]   # optional — require env vars
  security_warning: "Default SECRET_KEY is INSECURE — always set SAMPLEMIND_SECRET_KEY in production"

# ── VSCode integration ────────────────────────────────────────────────────────
vscode:
  config_dir: .vscode/
  files:
    settings: .vscode/settings.json
    tasks: .vscode/tasks.json
    extensions: .vscode/extensions.json
    launch: .vscode/launch.json
  python_interpreter: "${workspaceFolder}/.venv/bin/python"
  format_on_save: true     # ruff handles format + lint + imports
  test_framework: pytest
  test_path: tests/
  rust_analyzer_project: app/src-tauri/Cargo.toml
  key_extensions:
    - charliermarsh.ruff
    - ms-python.python
    - rust-lang.rust-analyzer
    - svelte.svelte-vscode
    - tauri-apps.tauri-vscode

# ── Terminal shortcuts reference ──────────────────────────────────────────────
terminal:
  shell_config: .auggie/tools/terminal.yaml
  key_aliases:
    pt: "uv run pytest tests/ -v --tb=short"
    ptf: "uv run pytest tests/ -m 'not slow'"
    rl: "uv run ruff check src/ tests/"
    rfix: "uv run ruff check --fix src/ && uv run ruff format src/"
    cc: "cargo clippy --manifest-path app/src-tauri/Cargo.toml -- -D warnings"
    smserve: "uv run samplemind serve"
    smapi: "uv run samplemind api --reload"

# ── Agent → model routing (complete table) ────────────────────────────────────
agent_models:
  audio-analyzer: sonnet
  test-runner: sonnet
  tauri-builder: sonnet
  doc-writer: haiku
  fl-studio-agent: sonnet
  api-agent: sonnet
  web-agent: sonnet
  security-agent: sonnet
  devops-agent: sonnet
  ml-agent: sonnet
  phase-02-audio-testing: sonnet
  phase-03-database: sonnet
  phase-04-cli: sonnet
  phase-05-web: sonnet
  phase-06-desktop: sonnet
  phase-07-fl-studio: sonnet
  phase-08-vst-plugin: sonnet
  phase-09-sample-packs: sonnet
  phase-10-production: opus    # high-stakes release engineering → most capable model

# ── Auggie file index ─────────────────────────────────────────────────────────
auggie_files:
  settings: .auggie/settings.yaml
  agents: .auggie/agents.yaml
  rules: .auggie/rules.md
  readme: .auggie/README.md
  skills:
    - analyze_audio, batch_import, build, check, coverage, db_migrate
    - fingerprint, import_samples, lint, run_tests, search, sidecar
    - serve_web, serve_api, tag, list_samples, pack, auth
    - setup_dev, start, health_check, db_inspect
  workflows:
    - ci-check, new-feature, release
    - dev-start, debug-classifier, add-audio-feature, onboard-dev
    - db-migration, build-plugin, fl-export, pack-create, api-test
  environments: [dev, prod]
  hooks: [pre-commit]
  tools: [vscode, terminal, debug]
  prompts: [debug-audio, code-review, api-design]

# ── Complete agent routing table (canonical reference) ────────────────────────
# Priority: 1=file_patterns  2=code_patterns  3=chat_keywords  4=phase_number
# Full routing logic lives in .auggie/routing.yaml
routing:
  config_file: .auggie/routing.yaml
  strategy: first_match

  # One-line summary per agent (details in routing.yaml):
  agents:
    audio-analyzer:
      files: ["src/samplemind/analyzer/**/*.py", "tests/test_audio_analysis.py", "tests/test_classifier.py"]
      code:  ["librosa.load", "classify_energy", "fingerprint_file", "sf.write("]
      chat:  ["librosa", "BPM", "classify", "instrument", "mood", "energy", "WAV"]
      skills: [analyze_audio, batch_import, fingerprint, coverage]
      workflows: [debug-classifier, add-audio-feature, ci-check]
      commands: [/analyze, /import, /list, /search, /tag]
      model: sonnet

    test-runner:
      files: ["tests/test_*.py", "tests/conftest.py", ".github/workflows/python-lint.yml"]
      code:  ["import pytest", "@pytest.fixture", "def test_", "fail_under"]
      chat:  ["pytest", "test", "failing", "coverage", "CI", "fixture"]
      skills: [run_tests, coverage, lint, check]
      workflows: [ci-check, new-feature]
      commands: [/check, /test]
      model: sonnet

    tauri-builder:
      files: ["app/src-tauri/src/**/*.rs", "app/src/**/*.svelte", "app/src-tauri/Cargo.toml"]
      code:  ["#[tauri::command]", "use tauri::", "invoke(", "pnpm tauri"]
      chat:  ["Tauri", "Rust", "Svelte", "build the app", "cargo"]
      skills: [build, check, lint]
      workflows: [ci-check, release]
      commands: [/build, /check]
      model: sonnet

    api-agent:
      files: ["src/samplemind/api/**/*.py"]
      code:  ["from fastapi import", "APIRouter", "@router.get", "Depends(get_current_active_user"]
      chat:  ["FastAPI", "REST API", "endpoint", "/api/v1", "Bearer token"]
      skills: [serve_api, auth, health_check]
      workflows: [api-test, dev-start, ci-check]
      commands: [/serve, /auth, /health, /db-inspect]
      model: sonnet

    web-agent:
      files: ["src/samplemind/web/app.py", "src/web/app.py", "src/samplemind/web/templates/**"]
      code:  ["from flask import", "@app.route", "hx-get=", "session[\"user_id\"]"]
      chat:  ["Flask", "web UI", "HTMX", "SSE", "login page"]
      skills: [serve_web, health_check]
      workflows: [dev-start, ci-check]
      commands: [/serve, /health]
      model: sonnet

    security-agent:
      files: ["src/samplemind/core/auth/**/*.py", "src/samplemind/core/models/user.py"]
      code:  ["from jose import jwt", "CryptContext", "RBACService", "SAMPLEMIND_SECRET_KEY"]
      chat:  ["JWT", "RBAC", "permission", "role", "bcrypt", "OAuth2"]
      skills: [auth]
      workflows: [ci-check]
      commands: [/auth]
      model: sonnet

    devops-agent:
      files: ["scripts/**/*.sh", ".github/workflows/*.yml", "pyproject.toml", ".env.example"]
      code:  ["uv sync", "astral-sh/setup-uv", "#!/usr/bin/env bash", "[tool.ruff]"]
      chat:  ["setup", "CI/CD", "GitHub Actions", "WSL2", "environment"]
      skills: [setup_dev, start, check, lint]
      workflows: [dev-start, onboard-dev, ci-check]
      commands: [/setup, /start, /health, /check]
      model: sonnet

    ml-agent:
      files: ["src/samplemind/utils/model_loader.py", "src/samplemind/search/**/*.py"]
      code:  ["from transformers import", "AutoModelForCausalLM", "load_in_8bit=True"]
      chat:  ["ML model", "transformers", "HuggingFace", "embedding", "semantic search"]
      skills: [analyze_audio]
      workflows: [add-audio-feature]
      commands: [/analyze]
      model: sonnet

    doc-writer:
      files: ["docs/en/**/*.md", "docs/no/**/*.md", "ARCHITECTURE.md", "README.md"]
      code:  ["## Overview", "## Architecture", "## Phase"]
      chat:  ["document", "write a doc", "update README", "phase doc"]
      skills: []
      workflows: [new-feature]
      commands: []
      model: haiku

    fl-studio-agent:
      files: ["plugin/**/*.cpp", "plugin/**/*.h", "src/samplemind/sidecar/**/*.py"]
      code:  ["juce::", "osascript", "nc -U /tmp/samplemind.sock"]
      chat:  ["FL Studio", "JUCE", "VST3", "AU", "sidecar", "MIDI"]
      skills: [sidecar]
      workflows: [fl-export, dev-start]
      commands: [/sidecar]
      model: sonnet

    phase-02-audio-testing:
      files: ["tests/conftest.py", "tests/test_audio_analysis.py", "tests/test_classifier.py"]
      code:  ["sf.write(", "kick_wav", "hihat_wav", "@pytest.mark.slow"]
      chat:  ["Phase 2", "WAV fixture", "conftest", "classifier threshold"]
      skills: [run_tests, analyze_audio, coverage]
      workflows: [ci-check, add-audio-feature]
      commands: [/check, /test]
      model: sonnet

    phase-03-database:
      files: ["src/samplemind/data/**/*.py", "migrations/**/*.py", "alembic.ini"]
      code:  ["from sqlmodel import", "PRAGMA journal_mode", "alembic revision"]
      chat:  ["Phase 3", "SQLModel", "Alembic", "migration", "ORM"]
      skills: [db_migrate, db_inspect]
      workflows: [db-migration, ci-check]
      commands: [/db-inspect]
      model: sonnet

    phase-04-cli:
      files: ["src/samplemind/cli/**/*.py", "src/main.py"]
      code:  ["import typer", "typer.Typer()", "@app.command()", "Console(stderr=True)"]
      chat:  ["Phase 4", "Typer", "Rich", "CLI", "--json flag"]
      skills: [check]
      workflows: [new-feature, ci-check]
      commands: [/import, /list, /search, /tag, /serve, /analyze]
      model: sonnet

    phase-05-web:
      files: ["src/samplemind/web/app.py", "src/samplemind/web/templates/**/*.html"]
      code:  ["@app.route", "hx-get=", "text/event-stream"]
      chat:  ["Phase 5", "Flask", "HTMX", "SSE", "web feature"]
      skills: []
      workflows: [dev-start, ci-check]
      commands: [/serve, /health]
      model: sonnet

    phase-06-desktop:
      files: ["app/src/**/*.svelte", "app/src/**/*.ts", "app/src-tauri/src/**/*.rs"]
      code:  ["$state(", "$derived(", "$effect(", "#[tauri::command]"]
      chat:  ["Phase 6", "Tauri desktop", "Svelte 5", "Runes", "SearchBar"]
      skills: [build]
      workflows: [ci-check, release]
      commands: [/build, /start]
      model: sonnet

    phase-07-fl-studio:
      files: ["src/samplemind/integrations/**/*.py", "src/samplemind/sidecar/**/*.py"]
      code:  ["osascript", "pbcopy", "IAC Driver", "win32com.client"]
      chat:  ["Phase 7", "FL Studio automation", "clipboard", "AppleScript"]
      skills: [sidecar]
      workflows: [fl-export]
      commands: [/sidecar]
      model: sonnet

    phase-08-vst-plugin:
      files: ["plugin/Source/**/*.cpp", "plugin/Source/**/*.h", "plugin/CMakeLists.txt"]
      code:  ["juce::AudioProcessor", "JUCE_DECLARE_", "juce_add_plugin("]
      chat:  ["Phase 8", "JUCE plugin", "VST3", "AU", "auval", "CMake"]
      skills: []
      workflows: [build-plugin, ci-check]
      commands: [/build]
      model: sonnet

    phase-09-sample-packs:
      files: ["src/samplemind/packs/**/*.py"]
      code:  ["SamplePackManifest", "zipfile.ZipFile", "sha256_checksum", ".smpack"]
      chat:  ["Phase 9", "sample pack", ".smpack", "pack create"]
      skills: []
      workflows: [pack-create]
      commands: [/pack]
      model: sonnet

    phase-10-production:
      files: [".github/workflows/release.yml", "app/src-tauri/entitlements.plist"]
      code:  ["xcrun notarytool", "codesign", "APPLE_SIGNING_IDENTITY"]
      chat:  ["Phase 10", "production", "signing", "notarization", "release"]
      skills: [build, check]
      workflows: [release, ci-check]
      commands: [/build, /check]
      model: opus     # high-stakes → most capable model
