# ══════════════════════════════════════════════════════════════════════════════
# SampleMind-AI — Auggie Agent Auto-Routing Configuration
#
# Priority order:
#   1. file_patterns  — matched against the currently open/reviewed file path
#   2. code_patterns  — matched against content visible in the active file
#   3. chat_keywords  — matched against the user's message in chat
#   4. phase_number   — if user mentions "Phase N", route to phase-0N agent
#
# First match wins within each priority tier.
# ══════════════════════════════════════════════════════════════════════════════

version: "1.0"
strategy: first_match

# ── Priority 1: File path patterns ────────────────────────────────────────────
# When the currently open or reviewed file matches a glob → auto-route agent.
file_patterns:

  # Audio analysis & classifier
  - glob: "src/samplemind/analyzer/**/*.py"
    agent: audio-analyzer
  - glob: "src/analyzer/**/*.py"
    agent: audio-analyzer

  # Tests
  - glob: "tests/test_audio_analysis.py"
    agent: audio-analyzer
  - glob: "tests/test_classifier.py"
    agent: audio-analyzer
  - glob: "tests/test_fingerprint.py"
    agent: audio-analyzer
  - glob: "tests/conftest.py"
    agent: phase-02-audio-testing
  - glob: "tests/test_*.py"
    agent: test-runner
  - glob: "tests/**/*.py"
    agent: test-runner

  # FastAPI & auth
  - glob: "src/samplemind/api/**/*.py"
    agent: api-agent
  - glob: "src/samplemind/core/auth/**/*.py"
    agent: security-agent
  - glob: "src/samplemind/core/models/user.py"
    agent: security-agent

  # Flask web UI
  - glob: "src/samplemind/web/app.py"
    agent: web-agent
  - glob: "src/web/app.py"
    agent: web-agent
  - glob: "src/samplemind/web/templates/**/*.html"
    agent: web-agent
  - glob: "src/samplemind/web/static/**"
    agent: web-agent

  # CLI
  - glob: "src/samplemind/cli/**/*.py"
    agent: phase-04-cli
  - glob: "src/main.py"
    agent: phase-04-cli

  # Database / ORM
  - glob: "src/samplemind/data/**/*.py"
    agent: phase-03-database
  - glob: "src/samplemind/core/models/sample.py"
    agent: phase-03-database
  - glob: "migrations/**/*.py"
    agent: phase-03-database
  - glob: "alembic.ini"
    agent: phase-03-database

  # Tauri / Rust / Svelte
  - glob: "app/src-tauri/src/**/*.rs"
    agent: tauri-builder
  - glob: "app/src-tauri/Cargo.toml"
    agent: tauri-builder
  - glob: "app/src-tauri/tauri.conf.json"
    agent: tauri-builder
  - glob: "app/src-tauri/capabilities/**/*.json"
    agent: tauri-builder
  - glob: "app/src-tauri/entitlements.plist"
    agent: phase-10-production
  - glob: "app/src/**/*.svelte"
    agent: phase-06-desktop
  - glob: "app/src/**/*.ts"
    agent: phase-06-desktop
  - glob: "app/package.json"
    agent: tauri-builder

  # JUCE Plugin
  - glob: "plugin/Source/**/*.cpp"
    agent: phase-08-vst-plugin
  - glob: "plugin/Source/**/*.h"
    agent: phase-08-vst-plugin
  - glob: "plugin/CMakeLists.txt"
    agent: phase-08-vst-plugin

  # FL Studio / sidecar
  - glob: "src/samplemind/sidecar/**/*.py"
    agent: fl-studio-agent
  - glob: "src/samplemind/integrations/**/*.py"
    agent: phase-07-fl-studio

  # Sample packs
  - glob: "src/samplemind/packs/**/*.py"
    agent: phase-09-sample-packs

  # ML / embeddings
  - glob: "src/samplemind/utils/model_loader.py"
    agent: ml-agent
  - glob: "src/samplemind/search/**/*.py"
    agent: ml-agent
  - glob: "src/samplemind/agent/**/*.py"
    agent: ml-agent

  # DevOps / CI
  - glob: "scripts/**/*.sh"
    agent: devops-agent
  - glob: ".github/workflows/*.yml"
    agent: devops-agent
  - glob: ".github/workflows/release.yml"
    agent: phase-10-production
  - glob: "pyproject.toml"
    agent: devops-agent
  - glob: ".pre-commit-config.yaml"
    agent: devops-agent
  - glob: ".env.example"
    agent: devops-agent

  # Documentation
  - glob: "docs/en/**/*.md"
    agent: doc-writer
  - glob: "docs/no/**/*.md"
    agent: doc-writer
  - glob: "ARCHITECTURE.md"
    agent: doc-writer
  - glob: "CONTRIBUTING.md"
    agent: doc-writer
  - glob: "ROADMAP.md"
    agent: doc-writer

# ── Priority 2: Code patterns visible in active file ──────────────────────────
code_patterns:

  # Audio analysis
  - contains: "librosa.load"
    agent: audio-analyzer
  - contains: "classify_energy"
    agent: audio-analyzer
  - contains: "classify_instrument"
    agent: audio-analyzer
  - contains: "fingerprint_file"
    agent: audio-analyzer
  - contains: "spectral_centroid"
    agent: audio-analyzer

  # FastAPI
  - contains: "from fastapi import"
    agent: api-agent
  - contains: "APIRouter"
    agent: api-agent
  - contains: "Depends(get_current_active_user"
    agent: api-agent

  # Flask
  - contains: "from flask import"
    agent: web-agent
  - contains: "@app.route"
    agent: web-agent
  - contains: "hx-get="
    agent: web-agent

  # Auth / security
  - contains: "from jose import jwt"
    agent: security-agent
  - contains: "CryptContext"
    agent: security-agent
  - contains: "RBACService"
    agent: security-agent
  - contains: "SAMPLEMIND_SECRET_KEY"
    agent: security-agent

  # Tauri / Rust
  - contains: "#[tauri::command]"
    agent: tauri-builder
  - contains: "$state("
    agent: phase-06-desktop
  - contains: "$derived("
    agent: phase-06-desktop

  # Tests
  - contains: "@pytest.fixture"
    agent: test-runner
  - contains: "def test_"
    agent: test-runner
  - contains: "sf.write("
    agent: phase-02-audio-testing
  - contains: "kick_wav"
    agent: phase-02-audio-testing

  # Database
  - contains: "from sqlmodel import"
    agent: phase-03-database
  - contains: "PRAGMA journal_mode"
    agent: phase-03-database
  - contains: "alembic"
    agent: phase-03-database

  # CLI
  - contains: "import typer"
    agent: phase-04-cli
  - contains: "typer.Typer()"
    agent: phase-04-cli

  # JUCE
  - contains: "juce::"
    agent: phase-08-vst-plugin
  - contains: "#include <juce_audio_processors"
    agent: phase-08-vst-plugin

  # ML
  - contains: "from transformers import"
    agent: ml-agent
  - contains: "AutoModelForCausalLM"
    agent: ml-agent

# ── Priority 3: Chat keyword → agent ──────────────────────────────────────────
chat_keywords:

  audio-analyzer:
    - librosa, BPM, key detection, WAV, AIFF, audio analysis
    - classify, classifier, energy, mood, instrument, fingerprint
    - why is this classified, add audio feature, spectral

  test-runner:
    - pytest, test, failing, coverage, CI, conftest, fixture
    - write a test, add tests, check if tests pass, why is CI failing

  tauri-builder:
    - Tauri, Rust, Svelte, build the app, pnpm tauri, cargo clippy
    - IPC, invoke(), desktop app, Universal Binary, signing

  api-agent:
    - FastAPI, REST API, endpoint, /api/v1, OpenAPI, Bearer token
    - add an endpoint, API docs, uvicorn

  web-agent:
    - Flask, web UI, HTMX, SSE, template, login page, register
    - audio streaming, library view, update the web UI

  security-agent:
    - JWT, token, auth, RBAC, permission, role, bcrypt, password
    - secure this endpoint, OAuth2, secret key

  devops-agent:
    - setup, install, CI/CD, GitHub Actions, WSL2, environment
    - configure, pre-commit, first time setup

  ml-agent:
    - ML model, transformers, HuggingFace, embedding, semantic search
    - quantization, vector, FAISS, ChromaDB

  doc-writer:
    - document, write a doc, add to the docs, update README
    - phase doc, ARCHITECTURE, translate, Norwegian

  fl-studio-agent:
    - FL Studio, JUCE, VST3, AU, AppleScript, sidecar, MIDI
    - export to FL Studio, clipboard, osascript

# ── Priority 4: Phase number → agent ──────────────────────────────────────────
phase_routing:
  2: phase-02-audio-testing
  3: phase-03-database
  4: phase-04-cli
  5: phase-05-web
  6: phase-06-desktop
  7: phase-07-fl-studio
  8: phase-08-vst-plugin
  9: phase-09-sample-packs
  10: phase-10-production

