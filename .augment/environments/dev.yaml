# ══════════════════════════════════════════════════════════════════════════════
# Auggie CLI — Development Environment (Windows WSL2)
# Active when: settings.yaml active_environment: dev
# ══════════════════════════════════════════════════════════════════════════════

name: dev
description: Windows WSL2 development environment — Ubuntu on /home/ubuntu

# ── Workspace ─────────────────────────────────────────────────────────────────
workspace:
  root: /home/ubuntu/dev/projects/SampleMind-AI
  # NEVER use /mnt/c/... — 5-10× slower than Linux ext4 filesystem
  avoid_paths:
    - /mnt/c
    - /mnt/d
  git_fsmonitor: true    # git config core.fsmonitor true  (speeds up git on WSL2)

# ── Python runtime ────────────────────────────────────────────────────────────
python:
  manager: uv
  version: "3.13"
  venv_activation: "source .venv/bin/activate"
  run_prefix: "uv run"

# ── Node / frontend ───────────────────────────────────────────────────────────
node:
  manager: pnpm
  working_dir: app/

# ── Rust ─────────────────────────────────────────────────────────────────────
rust:
  manifest: app/src-tauri/Cargo.toml
  targets_installed: [x86_64-unknown-linux-gnu]
  # Universal Binary requires macOS — not available in WSL2

# ── Database ─────────────────────────────────────────────────────────────────
database:
  path: ~/.samplemind/library.db
  # Tests: always use in-memory  sqlite://
  test_db: sqlite://

# ── Environment variables ─────────────────────────────────────────────────────
env_vars:
  required:
    - ANTHROPIC_API_KEY
  optional:
    - SAMPLEMIND_DB_PATH    # override default DB path
    - SAMPLEMIND_LOG_LEVEL  # debug | info | warning | error
    - SAMPLEMIND_WORKERS    # override default parallel worker count

# ── Tools validation (run on env load) ───────────────────────────────────────
validate:
  commands:
    - uv --version
    - pnpm --version
    - cargo --version
    - python --version

# ── WSL2-specific notes ───────────────────────────────────────────────────────
notes:
  - "Open VS Code from WSL terminal: code ."
  - "Do NOT put code on /mnt/c (NTFS) — use /home/ubuntu (ext4)"
  - "macOS-only tests (@pytest.mark.macos) will be skipped automatically"
  - "Universal Binary builds require actual macOS — not WSL2"
  - "AppleScript / osascript does not work in WSL2"

