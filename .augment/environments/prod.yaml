# ══════════════════════════════════════════════════════════════════════════════
# Auggie CLI — Production Environment (macOS 12+ Universal Binary target)
# Active when: settings.yaml active_environment: prod
# ══════════════════════════════════════════════════════════════════════════════

name: prod
description: macOS 12+ production build target (arm64 + x86_64 Universal Binary)

# ── Prerequisites ─────────────────────────────────────────────────────────────
prerequisites:
  commands:
    - "xcode-select --install"
    - "brew install uv pnpm rustup"
    - "rustup target add aarch64-apple-darwin x86_64-apple-darwin"

# ── Python runtime ────────────────────────────────────────────────────────────
python:
  manager: uv
  version: "3.13"
  run_prefix: "uv run"

# ── Build targets ─────────────────────────────────────────────────────────────
build:
  tauri_target: universal-apple-darwin
  tauri_command: "cd app && pnpm tauri build --target universal-apple-darwin"
  sidecar_targets:
    - aarch64-apple-darwin
    - x86_64-apple-darwin
  plugin_preset: macos-release     # CMakePresets.json preset name

# ── macOS signing & notarization ─────────────────────────────────────────────
signing:
  identity_env: APPLE_SIGNING_IDENTITY        # e.g. "Developer ID Application: ..."
  team_id_env: APPLE_TEAM_ID
  apple_id_env: APPLE_ID
  password_env: APPLE_PASSWORD                # app-specific password
  notarytool_profile: SampleMind-Notarize
  entitlements: app/src-tauri/entitlements.plist
  required_entitlements:
    - com.apple.security.automation.apple-events
    - com.apple.security.cs.allow-unsigned-executable-memory
    - com.apple.security.files.user-selected.read-write
    - com.apple.security.assets.music.read-write

# ── Database (production location) ───────────────────────────────────────────
database:
  path: "~/Library/Application Support/SampleMind/samplemind.db"

# ── FL Studio paths (macOS) ───────────────────────────────────────────────────
fl_studio:
  samples_fl20: "~/Documents/Image-Line/FL Studio/Data/Patches/Samples/SampleMind"
  samples_fl21: "~/Documents/Image-Line/FL Studio 21/Data/Patches/Samples/SampleMind"
  au_plugin: "~/Library/Audio/Plug-Ins/Components/SampleMind.component"
  vst3_plugin: "~/Library/Audio/Plug-Ins/VST3/SampleMind.vst3"

# ── Plugin validation ─────────────────────────────────────────────────────────
plugin_validation:
  au_command: "auval -v aufx SmPl SmAI"
  # Requires Accessibility: System Preferences → Privacy & Security → Accessibility

# ── Release checklist ─────────────────────────────────────────────────────────
release_checklist:
  - "uv run ruff check src/ tests/"
  - "uv run pytest tests/ -m 'not macos' -v"
  - "cargo clippy --manifest-path app/src-tauri/Cargo.toml -- -D warnings"
  - "cd app && pnpm tauri build --target universal-apple-darwin"
  - "lipo -info app/src-tauri/target/universal-apple-darwin/release/bundle/macos/SampleMind.app/Contents/MacOS/SampleMind"
  - "Notarize with: xcrun notarytool submit ... --keychain-profile SampleMind-Notarize"
  - "auval -v aufx SmPl SmAI    # if plugin/ was updated"

