# ══════════════════════════════════════════════════════════════════════════════
# Skill: curate
# AI-powered library curation using LLM reasoning.
# Owner: phase-12-ai-curation
# ══════════════════════════════════════════════════════════════════════════════

name: curate
description: >
  Run the AI curation agent to organize the library, generate smart playlists,
  identify gaps, and surface hidden gems. The LLM receives library statistics
  and returns structured JSON actions. All actions are dry-run by default.
agent: phase-12-ai-curation
feature_flag: ai_curation   # analyze command works without flag

commands:
  curate:
    cli: "uv run samplemind curate '{goal}' [--model {model}] [--execute] [--json]"
    example: "uv run samplemind curate 'create a dark trap playlist' --execute"
  analyze:
    cli: "uv run samplemind curate analyze [--json]"
    description: "Library stats without LLM (no API key needed)"
  playlist:
    cli: "uv run samplemind playlist by-energy-arc"
    description: "Rule-based energy arc playlist"

inputs:
  goal:
    type: str
    examples:
      - "create a dark trap playlist"
      - "find gaps in my library"
      - "organize samples by energy and mood"
      - "suggest samples I should buy to complete my trap library"
  model:
    type: str
    default: "auto (Claude if key available, else Ollama)"
    options:
      - "anthropic/claude-sonnet-4-5"
      - "openai/gpt-4o"
      - "ollama/llama3.2"
  dry_run:
    type: bool
    default: true
    note: "Pass --execute to actually apply actions"

outputs:
  reasoning: "LLM's analysis of the library"
  suggested_actions: "List of typed actions: create_playlist, tag_sample, etc."
  questions: "Clarifying questions from the LLM"
  insights: "Key insights about the library"

action_types:
  create_playlist:  "{'name': str, 'sample_ids': list[int]}"
  tag_sample:       "{'id': int, 'tags': str}"
  update_mood:      "{'id': int, 'mood': str}   # only valid mood values"
  suggest_imports:  "{'query': str, 'reason': str}"
  create_folder:    "{'name': str, 'filter': dict}"

rule_based_playlists:
  by_bpm:           "samplemind playlist by-bpm --target 140 --tolerance 5"
  by_energy_arc:    "samplemind playlist energy-arc"
  by_key:           "samplemind playlist by-key 'A min' --circle"
  similar_to:       "samplemind playlist similar-to --id 42"

trigger_keywords:
  - curate, AI curation, organize, smart playlist, gap analysis
  - LLM library, suggest samples, energy arc, playlist generator

trigger_files:
  - "src/samplemind/agent/**/*.py"
  - "tests/test_ai_curation.py"

related_skills:
  - analyze_audio    # provides classification data for curation
  - list_samples     # feeds the library snapshot
  - tag              # applies curation-suggested tags

related_workflows:
  - add-audio-feature   # when adding new analysis dimensions
  - ci-check

examples:
  - command: "uv run samplemind curate analyze"
    description: "Show library stats (no LLM needed)"

  - command: "uv run samplemind curate 'create dark trap set' --model ollama/llama3.2"
    description: "Free local curation with Ollama"

  - command: "uv run samplemind curate 'find gaps' --execute"
    description: "Find gaps and apply suggested tags immediately"

