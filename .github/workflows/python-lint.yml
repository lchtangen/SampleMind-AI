name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Python: lint + format + tests (Linux) ─────────────────────────────────
  python:
    name: Python (uv + ruff + pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Run pytest
        run: uv run pytest tests/ -v --tb=short

      - name: Check coverage (warn only)
        run: uv run pytest tests/ --cov=samplemind --cov-report=term-missing --cov-fail-under=60
        continue-on-error: true   # raise threshold as coverage grows

  # ── Python: Windows matrix ────────────────────────────────────────────────
  python-windows:
    name: Python Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Run fast tests only
        run: uv run pytest tests/ -m "not slow and not macos" -v --tb=short

  # ── Rust: clippy + tests ───────────────────────────────────────────────────
  rust:
    name: Rust (clippy + cargo test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app/src-tauri -> target"

      - name: Install Tauri system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cargo clippy
        run: cargo clippy --manifest-path app/src-tauri/Cargo.toml -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path app/src-tauri/Cargo.toml

  # ── macOS smoke test (Python, runs on all PRs + main) ─────────────────────
  python-macos:
    name: Python macOS smoke test
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Run fast tests only (skip slow audio fixtures)
        run: uv run pytest tests/ -m "not slow" -v --tb=short
